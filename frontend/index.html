<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basck Law — Gestão Jurídica Inteligente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/app.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230a0a0f'/%3E%3Ctext x='50' y='65' font-family='Cormorant Garamond, serif' font-size='52' font-weight='700' text-anchor='middle' fill='%23c9a55a'%3EB%3C/text%3E%3C/svg%3E" />
  <style>
    /* Tela de boot — some quando o app monta */
    .boot-loader { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #0a0a0f; color: #c9a55a; font-family: 'Cormorant Garamond', serif; font-size: 28px; letter-spacing: 0.05em; z-index: 9999; }
    .boot-loader.hidden { display: none; }
  </style>
</head>
<body>
  <div id="root">
    <div class="boot-loader" id="boot-loader">
      <span>Basck Law</span>
    </div>
  </div>

  <!-- Erro handler visível para debug em produção -->
  <script>
    window.addEventListener('error', function (e) {
      var root = document.getElementById('root');
      if (!root) return;
      var existing = document.getElementById('boot-error');
      if (existing) existing.remove();
      var box = document.createElement('div');
      box.id = 'boot-error';
      box.style.cssText = 'position:fixed;inset:20px;background:#1a0f0f;color:#ffaaaa;padding:24px;font-family:monospace;font-size:13px;border:1px solid #c75a4a;border-radius:8px;overflow:auto;z-index:10000;white-space:pre-wrap;line-height:1.5;';
      box.textContent = 'Erro ao iniciar Basck Law:\n\n' + (e.message || 'desconhecido') + '\n\n' + (e.filename || '') + ':' + (e.lineno || '?') + '\n\nDica: abra o Console (F12) para mais detalhes.';
      document.body.appendChild(box);
    });
    window.addEventListener('unhandledrejection', function (e) {
      var msg = (e.reason && (e.reason.message || e.reason.toString())) || 'Promise rejeitada';
      window.dispatchEvent(new ErrorEvent('error', { message: '[promise] ' + msg, filename: 'app.js' }));
    });
  </script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- v1.1.1: bundle unico gerado por backend/build-bundle.js -->
  <script type="text/babel" data-presets="react" src="/dist/bundle.jsx"></script>

  <script>
    // Esconde o loader quando o React monta
    document.addEventListener('DOMContentLoaded', function () {
      setTimeout(function () {
        var loader = document.getElementById('boot-loader');
        if (loader) loader.classList.add('hidden');
      }, 200);
    });
  </script>
</body>
</html>
